# pnpm 11+ moved several settings out of package.json. This file holds them.
# We do not use pnpm workspaces — this is a single Next.js app.
#
# `allowBuilds` whitelists packages whose install scripts may run.
# Every entry is a standard transitive dep of Next, Prisma, Sentry, Vitest,
# or ESLint that needs to compile or download platform-specific binaries.

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': true
  core-js: true
  esbuild: true
  prisma: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
