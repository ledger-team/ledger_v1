<svg width="320" viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Loading">
  <defs>
    <style>
      @keyframes ledgerWave {
        0%, 60%, 100% { opacity: 0.25; transform: translateY(0px); }
        30% { opacity: 1; transform: translateY(-6px); }
      }
      .lchar {
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 800;
        font-size: 64px;
        fill: #B5FF3D;
        animation: ledgerWave 1.6s ease-in-out infinite;
      }
      @media (prefers-reduced-motion: reduce) {
        .lchar { animation: none; opacity: 1; }
      }
    </style>
  </defs>
  <text x="40" y="80" class="lchar" style="animation-delay: 0s">l</text>
  <text x="68" y="80" class="lchar" style="animation-delay: 0.12s">e</text>
  <text x="108" y="80" class="lchar" style="animation-delay: 0.24s">d</text>
  <text x="150" y="80" class="lchar" style="animation-delay: 0.36s">g</text>
  <text x="192" y="80" class="lchar" style="animation-delay: 0.48s">e</text>
  <text x="232" y="80" class="lchar" style="animation-delay: 0.6s">r</text>
</svg>
